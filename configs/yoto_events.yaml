# ds005815 YOTO: map event value (BIDS events.tsv "value" or vmrk code) -> stimulus_id
# TrialProc events have integer value 21-47 (27 conditions). Map tone conditions only.
# Adjust these from dataset documentation or by inspecting unique trial_type+value for auditory tones.
# C: 261.63 Hz, D: 293.66 Hz, E: 329.63 Hz

dataset_id: ds005815

# extracted from https://github.com/CECNL/YOTO_You_Only_Think_Once/blob/main/python/Power-Spectral%20Density%20(PSD)%20Analysis/config.py

event_value_to_stimulus: 
  27: tone_C
  28: tone_D
  29: tone_E

# 
trial_type_to_stimulus: {}

stimuli:
  tone_C:
    frequency_hz: 261.63
  tone_D:
    frequency_hz: 293.66
  tone_E:
    frequency_hz: 329.63
